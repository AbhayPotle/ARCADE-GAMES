services:
  - type: web
    name: arcade-games-server-abhay
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        value: "cyberpunk_arcadeverse_secret_key_prod_2026"
      - key: NODE_ENV
        value: production

  - type: web
    name: arcadeverse-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://arcade-games-server-abhay.onrender.com"
