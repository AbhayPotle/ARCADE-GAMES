services:
  - type: web
    name: arcadeverse-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        value: "cyberpunk_arcadeverse_secret_key_prod_2026"
      - key: NODE_ENV
        value: production

  - type: static
    name: arcadeverse-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://arcadeverse-backend.onrender.com"
